name: Build Hero Binary

permissions:
  contents: write

on:
  push:
    branches:
      - development_hero_binary
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Setup Vlang
        run: |
          git clone --depth=1 https://github.com/vlang/v
          cd v
          make
          sudo ./v symlink
          cd ..

      - name: Setup Herolib
        run: |
          mkdir -p ~/.vmodules/freeflowuniverse
          ln -s $GITHUB_WORKSPACE/lib ~/.vmodules/freeflowuniverse/herolib

          echo "Installing secp256k1..."
          # Install build dependencies
          sudo apt-get install -y build-essential wget autoconf libtool

          # Download and extract secp256k1
          cd /tmp
          wget https://github.com/bitcoin-core/secp256k1/archive/refs/tags/v0.3.2.tar.gz
          tar -xvf v0.3.2.tar.gz

          # Build and install
          cd secp256k1-0.3.2/
          ./autogen.sh
          ./configure
          make -j 5
          sudo make install

      - name: Build Hero
        run: |
          v -cg -enable-globals -w -n cli/hero.v

      - name: Upload Binary as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: hero-linux
          path: hero
          retention-days: 90  # Keep the artifact for 90 days